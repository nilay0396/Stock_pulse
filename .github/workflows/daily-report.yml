name: Daily Report Pipeline

# Runs the Market Pulse report-generation pipeline outside Netlify's function
# timeout. 09:00 and 13:00 IST daily, plus manual dispatch. See
# netlify/functions/pipeline/run.ts.
on:
  schedule:
    # 03:30 UTC = 09:00 IST, 07:30 UTC = 13:00 IST (no DST).
    - cron: "30 3 * * *"
    - cron: "30 7 * * *"
  workflow_dispatch:
    inputs:
      skip_llm:
        description: "Skip LLM (deterministic fallback narrative/rationales, no Anthropic cost)"
        type: boolean
        default: false
      universe_limit:
        description: "Cap the universe to the first N stocks (blank = full NSE universe)"
        type: string
        default: ""
      refresh_instruments:
        description: "Refresh NSE equity instrument cache before expanding universe"
        type: boolean
        default: true
      expand_universe:
        description: "First populate stock_universe from the Kite instrument cache (~2000 NSE EQ)"
        type: boolean
        default: true
      force:
        description: "Force a run even if today already has a successful report"
        type: boolean
        default: false
      skip_delivery:
        description: "Generate the report but do not send Telegram/email"
        type: boolean
        default: false

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install function dependencies
        working-directory: netlify/functions
        run: npm ci

      - name: Refresh Kite access token (best-effort)
        # The pipeline reads the Kite token from Supabase system_settings.
        # Refresh it via the Netlify function first so the liquidity gate +
        # F&O have a fresh token. Non-fatal: the pipeline degrades to
        # yahoo-only screening if this fails.
        continue-on-error: true
        run: |
          curl -sS -X POST "${NETLIFY_SITE_URL%/}/.netlify/functions/kite-token-refresh" \
            -H "x-refresh-secret: ${KITE_REFRESH_SECRET}" \
            --max-time 120 || echo "kite token refresh failed (continuing)"
        env:
          NETLIFY_SITE_URL: ${{ secrets.NETLIFY_SITE_URL }}
          KITE_REFRESH_SECRET: ${{ secrets.KITE_REFRESH_SECRET }}

      - name: Refresh NSE instrument cache (chunked)
        if: github.event_name == 'schedule' || inputs.refresh_instruments == true
        run: |
          node <<'NODE'
          const site = process.env.NETLIFY_SITE_URL?.replace(/\/$/, "");
          const secret = process.env.KITE_REFRESH_SECRET;
          if (!site || !secret) {
            throw new Error("NETLIFY_SITE_URL and KITE_REFRESH_SECRET are required");
          }

          const limit = 1000;
          let offset = 0;
          for (let hop = 0; hop < 20; hop++) {
            const url = `${site}/.netlify/functions/kite-instruments-refresh?exchange=NSE&offset=${offset}&limit=${limit}`;
            const res = await fetch(url, {
              method: "POST",
              headers: { "x-refresh-secret": secret },
            });
            const text = await res.text();
            if (!res.ok) {
              throw new Error(`NSE instrument refresh failed at offset ${offset}: HTTP ${res.status} ${text}`);
            }
            const body = JSON.parse(text);
            console.log(`instrument-cache: exchange=${body.exchange} offset=${body.offset} upserted=${body.upserted} total=${body.total_filtered} has_more=${body.has_more}`);
            if (!body.has_more) break;
            offset += limit;
          }
          NODE
        env:
          NETLIFY_SITE_URL: ${{ secrets.NETLIFY_SITE_URL }}
          KITE_REFRESH_SECRET: ${{ secrets.KITE_REFRESH_SECRET }}

      - name: Run pipeline
        working-directory: netlify/functions
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Scheduled runs: full NSE universe, LLM on, delivery on.
            # Force allows both scheduled runs on the same date.
            ARGS="--expand-universe --force"
          else
            [ "${{ inputs.skip_llm }}" = "true" ] && ARGS="$ARGS --skip-llm"
            [ "${{ inputs.skip_delivery }}" = "true" ] && ARGS="$ARGS --skip-delivery"
            [ "${{ inputs.expand_universe }}" = "true" ] && ARGS="$ARGS --expand-universe"
            [ "${{ inputs.force }}" = "true" ] && ARGS="$ARGS --force"
            if [ -n "${{ inputs.universe_limit }}" ]; then ARGS="$ARGS --universe-limit ${{ inputs.universe_limit }}"; fi
          fi
          echo "Running: npx tsx pipeline/run.ts $ARGS"
          npx tsx pipeline/run.ts $ARGS
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
