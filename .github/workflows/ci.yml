name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  live-path-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Bundle Netlify functions
        working-directory: netlify/functions
        run: |
          npm ci
          npm run bundle

      - name: Build frontend
        working-directory: frontend
        run: |
          corepack enable
          yarn install --frozen-lockfile
          yarn build

      - name: Check Kite streamer syntax
        working-directory: kite-streamer
        run: |
          npm ci
          node --check src/server.mjs
