[build]
  base = "frontend"
  # Build the frontend, then install + bundle the Netlify Function ourselves
  # (esbuild --bundle inlines every npm dependency into a single self-contained
  # file) rather than relying on Netlify's own per-function dependency install,
  # which was not picking up netlify/functions/package.json and left `hono`
  # etc. as unresolved imports at runtime (ERR_MODULE_NOT_FOUND).
  command = "yarn build && cd ../netlify/functions && npm install && npm run bundle"
  publish = "build"
  functions = "../netlify/functions-dist"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
